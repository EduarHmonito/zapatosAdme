  <h1>Crear una cuenta</h1>
  <div id="texto">
    <form action="/registro" method="post">
<label for="nombre">Nombre completo:</label><br>
  <input 
  type="text" 
  id="nombre" 
  name="nombre" 
  required 
  minlength="3" 
  maxlength="40" 
  pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+" 
  placeholder="Ej: Eduar Moises Baes ">
    <br><br>
    <label for="edad">Edad:</label><br>
    <input 
  type="number" 
  id="edad" 
  name="edad" 
  required 
  min="18" 
  max="99" 
  placeholder="+18">
    <br><br>


    <label for="correo">Correo electrónico:</label><br>
    <input type="email" id="correo" name="correo" required><br><br>

    <label for="telefono">Número de teléfono:</label><br>
    <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{10}"><br><br>

    <label for="contraseña">Contraseña:</label><br>
    <input type="password" id="contraseña" name="contraseña" required><br><br>

    <label for="confirmar">Confirmar contraseña:</label><br>
    <input type="password" id="confirmar" name="confirmar" required><br><br>

    <button type="submit">Registrarse</button>
  </form>
  </div>
