  <h2>Registrate</h2>
   <div class="todo">
        <div class="formurario">
<form action="/registro" method="post">
      <label for="nombre" class="texto">Nombre completo:</label><br>
        <input type="text" id="nombre" name="nombre" required minlength="3" maxlength="40" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+"  >
        <br><br>
      <label for="edad" class="texto">Edad:</label><br>
        <input type="number" id="edad" name="edad" required min="18" max="99" value=18>
      <br><br>
      <label for="correo" class="texto">Correo electrónico:</label><br>
        <input type="email" id="correo" name="correo" required><br><br>
      <label for="telefono" class="texto">Número de teléfono:</label><br>
        <input type="tel" id="telefono" name="telefono" required pattern="[0-9]{10}"><br><br>
      <label for="contraseña" class="texto">Contrasena:</label><br>
        <input type="password" id="contrasena" name="contrasena" required><br><br>
      <label for="confirmar" class="texto">Confirmar contraseña:</label><br>
        <input type="password" id="confirmar" name="confirmar" required><br><br>
      <button type="submit">Registrarse</button>
    </form>
